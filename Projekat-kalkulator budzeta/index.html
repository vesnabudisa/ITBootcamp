<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator budzeta</title>
    <link rel="stylesheet" href="./src/style.css">
</head>

<body>
    <div class="konacni-podaci">
        <div class="ukupni-prihod"></div>
        <div class="ukupni-rashod"></div>
        <div class="preostali-budzet"></div>
    </div>
    <div class="forma">
        <form>
            <div class="select-tip">
                <select class="tip">
                    <option value="0" selected disabled>Vrsta transakcije</option>
                    <option value="1">PRIHOD</option>
                    <option value="2">RASHOD</option>
                </select>
            </div>
            <div class="input-opis">
                <input type="text" id="opis" placeholder="opis">
            </div>
            <div class="input-iznos">
                <input type="number" id="iznos" placeholder="iznos">
            </div>
            <button type="submit" class="potvrdi">Dodaj</button>
    </div>
    </form>
    <hr>
    <div class="podaci">

        <div class="prihodi">
            <label class="prihodi-label">PRIHODI</label>
        </div>
        <div class="rashodi">
            <label class="rashodi-label">RASHODI</label>
        </div>

    </div>

    <script type="module" src="./src/index.js"></script>
</body>

</html>
